<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View File - Hackathon Progress Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ddd; 
            min-height: 100vh; 
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 30%, #1a0a0a 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #150a0a 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #0f0a0a 50%, #0a0a0a 100%);
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            padding-bottom: 20px; 
            border-bottom: 1px solid #333; 
        }
        h1 { 
            color: #aaa; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: 900; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            font-size: 24px; 
        }
        h1:before {
            content: "// ";
            color: #555;
        }
        .back-btn { 
            background: #222; 
            color: #888; 
            padding: 8px 16px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600; 
            border: 1px solid #333; 
        }
        .back-btn:hover { 
            background: #333; 
            color: #aaa; 
        }
        .file-content {
            background: #151515;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        .file-content h2 {
            color: #888;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .markdown-body {
            background: #151515;
            color: #ddd;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, 
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            color: #ccc;
        }
        .markdown-body pre {
            background: #0a0a0a;
            border: 1px solid #333;
        }
        .markdown-body code {
            background: #0a0a0a;
            color: #ddd;
        }
        .markdown-body blockquote {
            border-left: 3px solid #444;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>File Viewer</h1>
            <a href="/" class="back-btn">Back to Dashboard</a>
        </header>
        
        <div class="file-content">
            <h2>{{ filename }}</h2>
            <div class="markdown-body">
                {{ content | safe }}
            </div>
        </div>
    </div>
</body>
</html>
