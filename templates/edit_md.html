<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Markdown - Hackathon Progress Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ddd; 
            min-height: 100vh; 
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 30%, #1a0a0a 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #150a0a 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #0f0a0a 50%, #0a0a0a 100%);
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding-bottom: 20px; 
            border-bottom: 1px solid #333; 
        }
        h1 { 
            color: #aaa; 
            font-family: 'Orbitron', sans-serif; 
            font-weight: 900; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            font-size: 24px; 
        }
        h1:before {
            content: "// ";
            color: #555;
        }
        .back-btn { 
            background: #222; 
            color: #888; 
            padding: 8px 16px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: 600; 
            border: 1px solid #333; 
        }
        .back-btn:hover { 
            background: #333; 
            color: #aaa; 
        }
        .edit-form {
            background: #151515;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
        }
        .edit-form h3 {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .edit-form textarea {
            width: 100%;
            min-height: 400px;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #0a0a0a;
            color: #ddd;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            margin-bottom: 15px;
        }
        .edit-form textarea:focus {
            outline: none;
            border-color: #444;
        }
        .edit-form textarea::placeholder { color: #555; }
        .action-btn {
            padding: 8px 16px;
            background: #222;
            color: #aaa;
            border: 1px solid #333;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
        }
        .action-btn:hover {
            background: #333;
            color: #ddd;
        }
        .action-btn.cancel {
            background: #151515;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Edit File</h1>
            <a href="/" class="back-btn">Back to Dashboard</a>
        </header>
        
        <form class="edit-form" method="POST" action="/save_md_file/{{ hackathon_id }}/{{ filename }}">
            <h3>Editing: {{ filename }}</h3>
            <textarea name="content" placeholder="Markdown content...">{{ content }}</textarea>
            <button type="submit" class="action-btn">Save</button>
            <a href="/" class="action-btn cancel">Cancel</a>
        </form>
    </div>
</body>
</html>
